<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>學習地圖學生頁</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #0f172a;
    }

    body {
      overflow: hidden;
    }

    #student-frame {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: #0f172a;
    }
  </style>
</head>
<body>
  <iframe id="student-frame" title="學習地圖學生頁"></iframe>
  <script>
    (function () {
      const frame = document.getElementById('student-frame');
      const params = new URLSearchParams(window.location.search);
      params.set('view', 'student');
      const targetUrl = `../index.html?${params.toString()}`;
      frame.src = targetUrl;
    })();
  </script>
</body>
</html>
